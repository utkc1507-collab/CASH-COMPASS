<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashCompass</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1>CashCompass</h1>
            <p>Navigate your finances</p>
        </header>

        <section class="add-expense-section">
            <h3>Add New Expense</h3>
            <form id="expense-form" onsubmit="event.preventDefault(); addExpense();">
                <div class="form-group">
                    <input type="text" id="title" placeholder="Expense Title" required>
                </div>
                <div class="form-row">
                    <input type="number" id="amount" placeholder="Amount" step="0.01" required>
                    <select id="category" required>
                        <option value="" disabled selected>Select Category</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Utilities">Utilities</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <textarea id="notes" placeholder="Optional notes..."></textarea>
                </div>
                <button type="submit" class="btn-primary">Add Expense</button>
            </form>
        </section>

        <section class="expenses-section">
            <div class="section-header">
                <h3>Recent Expenses</h3>
                <input class="search-input" id="search" placeholder="Search category..." oninput="fetchExpenses()">
            </div>
            <ul id="list" class="expense-list"></ul>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
